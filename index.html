<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Museum Gallery</title>
    <link rel="stylesheet" href="styles.css">
  </head>

  <body>
    <h1>Museum Gallery</h1>
    
    <div class="gallery">
        <img src="https://cdn.freecodecamp.org/curriculum/labs/stonehenge-thumbnail.jpg" alt="art of stonehenge" class="gallery-item">
        <img src="https://cdn.freecodecamp.org/curriculum/labs/storm-thumbnail.jpg" alt="art of people navigating a trail" class="gallery-item">
        <img src="https://cdn.freecodecamp.org/curriculum/labs/trees-thumbnail.jpg" alt="art of sheep with trees surrounding and a house in the background" class="gallery-item">
    </div>

    <div class="lightbox">
        <button id="close-btn">&times;</button>
        <img src="" alt="" id="lightbox-image">
    </div>

    <script src="script.js"></script>
  </body>

</html>
